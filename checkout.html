<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Cheap Plugz</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="checkout.css">
    <!-- Stripe -->
    <script src="https://js.stripe.com/v3/"></script>
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>

<body>
    <div
        style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; color: #fff; font-family: 'Outfit', sans-serif;">
        <img src="assets/logo.png" alt="Cheap Plugz Logo" style="max-height: 80px; width: auto; margin-bottom: 24px;">
        <h2 style="margin-bottom: 16px;">Preparing your checkout...</h2>
        <p style="color: #888;">Please wait while we redirect you to secure payment.</p>
    </div>

    <!-- Required elements for fallback JS logic -->
    <div style="display: none;">
        <span id="user-email-display"></span>
        <button id="pay-now-btn"></button>
        <span id="btn-total-price"></span>
        <span id="summary-subtotal"></span>
        <span id="summary-shipping"></span>
        <span id="summary-tax"></span>
        <span id="summary-total-final"></span>
        <div id="checkout-items"></div>
        <div id="tax-line"></div>
        <span id="tax-label"></span>
        <select id="state"></select>
        <!-- Missing select/inputs that JS tried to read are fine because we removed them from JS -->
    </div>

    <script src="checkout.js"></script>
    <script>
        if (window.feather) feather.replace();
    </script>
</body>

</html>
