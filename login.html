<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Cheap Plugz</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        .login-page {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .auth-card {
            background-color: #111;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-card h1 {
            font-size: 1.5rem;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 8px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #fff;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 16px;
        }

        .auth-message {
            margin-top: 16px;
            font-size: 0.9rem;
            color: #4CAF50;
            display: none;
        }
    </style>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function () {
            emailjs.init("0QjEAceoyr3ERYIQ0");
        })();
    </script>
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <a href="/" class="logo">
                <img src="assets/logo.png" alt="Cheap Plugz Logo" class="logo-img">
            </a>
        </div>
    </header>

    <main class="login-page">
        <div class="auth-card">
            <h1>Sign in / Register</h1>
            <p style="color:var(--text-secondary); margin-bottom: 24px; font-size:0.9rem;">Enter your info to checkout
                faster.</p>

            <form id="auth-form">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone number</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label for="address">Shipping Address <span
                            style="font-weight:normal; font-size:0.8rem; color:#888;">(Optional)</span></label>
                    <input type="text" id="address">
                    <div id="address-warning"
                        style="margin-top:8px; font-size:0.8rem; color:var(--text-secondary); line-height:1.4;">
                        A valid shipping address is required to dispatch your items. For details on how we handle your
                        data, please review our <a href="privacy.html"
                            style="color:#fff; text-decoration:underline;">Privacy Policy</a>.
                    </div>
                </div>
                <button type="submit" class="auth-btn">Save Information</button>
                <div class="auth-message" id="auth-message">Info saved! Returning...</div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const fullName = document.getElementById('fullName').value;
            const address = document.getElementById('address').value;

            // Get existing customers or create new array
            let customers = localStorage.getItem('tonka_customers');
            customers = customers ? JSON.parse(customers) : [];

            // Add or update customer
            const existingIndex = customers.findIndex(c => c.email === email);
            if (existingIndex >= 0) {
                customers[existingIndex] = { ...customers[existingIndex], phone, fullName, address, lastLogin: new Date().toISOString() };
